<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
        <link rel="icon" type="image/png" href="./icon.jpeg">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-page: #dbdbdb;
            --header-bg: #1a151b;
            --purple-main: #7b1fa2;
            --btn-grad-1: linear-gradient(90deg, #303f9f, #7b1fa2);
            --btn-grad-2: linear-gradient(90deg, #1976d2, #ad1457);
        }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; }
        body { background: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .mobile-frame {
            width: 375px; height: 780px; background: var(--bg-page);
            border-radius: 10px; overflow: hidden; position: relative;
        }

        header { background: var(--header-bg); color: white; padding: 18px 15px; display: flex; align-items: center; justify-content: space-between; }
        header i { font-size: 20px; }
        header span { font-weight: bold; font-size: 18px; margin-right: auto; padding-right: 20px; }

        .container { padding: 25px; }
        .lang-box { background: #3949ab; color: white; width: fit-content; padding: 8px 12px; border-radius: 6px; font-weight: bold; margin-bottom: 40px; }

        .input-wrapper { margin-bottom: 25px; }
        .input-wrapper label { display: block; font-weight: bold; color: #444; margin-bottom: 8px; }
        .input-wrapper input { width: 100%; border: none; border-bottom: 1px solid #999; background: transparent; padding: 10px 0; outline: none; font-size: 16px; }
        
        .link-pink { color: #8e24aa; text-decoration: none; font-size: 14px; font-weight: bold; display: block; margin-top: 8px; }

        .btn-large { width: 100%; padding: 16px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .bg-grad-blue { background: var(--btn-grad-1); }
        .bg-grad-pink { background: var(--btn-grad-2); }

        .bottom-grid { display: flex; gap: 15px; margin-top: 40px; }
        .card-white { background: white; flex: 1; padding: 25px 10px; border-radius: 0; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .icon-circle { width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: white; font-size: 28px; }
        .light-purple { background: #ba68c8; }
        .dark-purple { background: #6a1b9a; }
        .card-white p { color: #555; font-weight: bold; font-size: 14px; }

        /* Modal */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #fdfdfd; width: 85%; padding: 30px 20px; border-radius: 12px; text-align: center; }
        .modal h2 { color: #7b1fa2; font-size: 22px; margin-bottom: 10px; }
        .modal p { font-size: 14px; color: #333; margin-bottom: 25px; }
        .otp-inputs { display: flex; justify-content: center; gap: 10px; direction: ltr; margin-bottom: 25px; }
        .otp-inputs input { width: 45px; height: 45px; border: 1px solid #bbb; border-radius: 8px; text-align: center; font-size: 20px; background: transparent; }
        .cancel-lnk { color: #7b1fa2; background: none; border: none; font-weight: bold; font-size: 16px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="mobile-frame">
    <header>
        <i class="fas fa-bars"></i>
        <span>تسجيل الدخول</span>
    </header>

    <div class="container">
        <div class="lang-box">En</div>

        <div class="input-wrapper">
            <label>اسم المستخدم</label>
            <input type="text" placeholder="">
            <a href="#" class="link-pink">هل نسيت اسم المستخدم ؟</a>
        </div>

        <div class="input-wrapper">
            <label>كلمة المرور</label>
            <input type="password" placeholder="">
            <a href="#" class="link-pink">هل نسيت الرقم السري ؟</a>
        </div>

        <button class="btn-large bg-grad-blue">تسجيل الدخول</button>
        <button class="btn-large bg-grad-pink" id="btnShowModal">استخدم رمز التأكيد لتسجيل الدخول</button>

        <div class="bottom-grid">
            <div class="card-white">
                <div class="icon-circle light-purple"><i class="fas fa-phone-alt"></i></div>
                <p>اتصل بنا</p>
            </div>
            <div class="card-white">
                <div class="icon-circle dark-purple"><i class="fas fa-wallet"></i></div>
                <p>عن محفظتي</p>
            </div>
        </div>
    </div>

    <!-- Modal OTP -->
    <div class="overlay" id="otpOverlay">
        <div class="modal">
            <h2>تسجيل الدخول</h2>
            <p>تأكيد رمز الدخول للاستمرار</p>
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="in-otp">
                <input type="text" maxlength="1" class="in-otp">
                <input type="text" maxlength="1" class="in-otp">
                <input type="text" maxlength="1" class="in-otp">
            </div>
            <button class="cancel-lnk" id="btnHideModal">إلغاء</button>
        </div>
    </div>
</div>

<script>
    const overlay = document.getElementById('otpOverlay');
    const inputs = document.querySelectorAll('.in-otp');
    
    document.getElementById('btnShowModal').onclick = () => {
        overlay.style.display = 'flex';
        inputs[0].focus();
    };
    
    document.getElementById('btnHideModal').onclick = () => overlay.style.display = 'none';

    inputs.forEach((input, index) => {
        input.addEventListener('keyup', (e) => {
            if (input.value && index < 3) inputs[index + 1].focus();
            
            let val = "";
            inputs.forEach(i => val += i.value);
            if (val.length === 4) {
                if (val === "2001") {
                    window.location.href = "dashboard.html";
                } else {
                    alert("الرمز غير صحيح");
                    inputs.forEach(i => i.value = "");
                    inputs[0].focus();
                }
            }
        });
    });
</script>
</body>
</html>
