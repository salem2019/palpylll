<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفع لصديق</title>
        <link rel="icon" type="image/png" href="./icon.jpeg">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; }
        body { background: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .mobile-frame {
            width: 375px; height: 780px; 
            background-color: #f2f2f2; /* لون الخلفية الرمادي الفاتح من الصورة */
            border-radius: 10px; overflow: hidden; display: flex; flex-direction: column;
        }

        header { 
            background: #1a151b; 
            color: white; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; /* السهم في جهة اليمين بسبب RTL */
        }
        header a { color: white; text-decoration: none; font-size: 20px; }

        .content { padding: 30px 20px; text-align: center; }
        
        .page-title { 
            color: #6a1b9a; 
            font-size: 24px; 
            font-weight: bold; 
            margin-bottom: 30px; 
            text-align: center;
        }

        /* المربع الأبيض والأيقونة */
        .option-container {
            background: white;
            width: 160px;
            height: 160px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            float: left; /* ليكون في جهة اليسار قليلاً كما في الصورة */
            margin-right: 20px;
        }

        .icon-circle {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7b1fa2, #4a148c);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            margin-bottom: 15px;
        }

        .option-text {
            font-size: 14px;
            color: #333;
            font-weight: bold;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="mobile-frame">
    <header>
        <!-- رابط العودة للواجهة الرئيسية -->
        <a href="dashboard.html"><i class="fas fa-arrow-right"></i></a>
    </header>

    <div class="content">
        <h2 class="page-title">الدفع لصديق</h2>

<!-- ابحث عن هذا الجزء في ملف pay-friend.html وحدثه -->
<div class="option-container" onclick="window.location.href='friends-list.html'">
    <div class="icon-circle">
        <i class="fas fa-user-friends"></i>
    </div>
    <p class="option-text">صديقك من جهات<br>الاتصال</p>
</div>
    </div>
</div>

</body>
</html>
